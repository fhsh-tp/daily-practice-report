{% extends "admin/layout.html" %}

{% block title %}系統設定 — {{ webpage.site_name }}{% endblock %}
{% block admin_title %}系統設定{% endblock %}
{% block admin_subtitle %}管理全站基本設定{% endblock %}

{% block admin_content %}
<div class="max-w-lg">
  <form method="post" action="/pages/admin/system/">
    <div class="bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-800 p-5 mb-4">
      <h2 class="text-sm font-semibold text-gray-700 dark:text-gray-300 mb-4 uppercase tracking-wide">全站設定</h2>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" for="site_name">
            網站名稱 <span class="text-red-500">*</span>
          </label>
          <input type="text" id="site_name" name="site_name" required
                 value="{{ config.site_name }}"
                 class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" for="admin_email">
            管理員 Email
          </label>
          <input type="email" id="admin_email" name="admin_email"
                 value="{{ config.admin_email }}"
                 class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-700 rounded-lg bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none"
                 placeholder="admin@example.com">
        </div>
      </div>
    </div>

    <div class="flex gap-3">
      <button type="submit"
              class="px-5 py-2.5 text-sm font-medium bg-brand-600 hover:bg-brand-700 text-white rounded-lg transition-colors duration-150 cursor-pointer">
        儲存設定
      </button>
    </div>
  </form>
</div>
{% endblock %}
