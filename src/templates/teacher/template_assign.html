{% extends "shared/base.html" %}
{% block title %}指派日期 — {{ template.name }}{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
  <div class="mb-6">
    <a href="/pages/teacher/classes/{{ class_id }}/templates"
       class="inline-flex items-center gap-1.5 text-sm text-gray-500 dark:text-gray-400 hover:text-brand-600 dark:hover:text-brand-400 transition-colors duration-150 mb-3">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
      </svg>
      返回模板列表
    </a>
    <h1 class="font-heading font-bold text-2xl text-gray-900 dark:text-gray-100">指派任務日期</h1>
    <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">
      模板：<strong class="text-gray-700 dark:text-gray-300">{{ template.name }}</strong>
      ／ 班級：<strong class="text-gray-700 dark:text-gray-300">{{ class_name }}</strong>
    </p>
  </div>

  <div class="bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-800 p-6 space-y-5">
    <div>
      <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1.5">指派日期 <span class="text-red-500">*</span></label>
      <input type="date" id="assign-date"
             class="w-full rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 px-3.5 py-2.5 text-sm text-gray-900 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-shadow duration-150">
      <p class="text-xs text-gray-400 dark:text-gray-500 mt-1">設定後，此日期學生提交任務時將使用此模板。</p>
    </div>

    <div id="result-msg" class="hidden px-4 py-3 rounded-lg text-sm"></div>

    <div class="flex items-center justify-between gap-4 pt-1">
      <a href="/pages/teacher/classes/{{ class_id }}/templates"
         class="text-sm text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 transition-colors duration-150">
        取消
      </a>
      <button onclick="assignDate()"
              class="inline-flex items-center gap-2 bg-brand-600 hover:bg-brand-700 text-white font-semibold px-6 py-2.5 rounded-lg text-sm transition-colors duration-150 cursor-pointer">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5" />
        </svg>
        確認指派
      </button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const CLASS_ID = '{{ class_id }}';
const TEMPLATE_ID = '{{ template.id }}';

// Default to today
document.getElementById('assign-date').value = new Date().toISOString().slice(0, 10);

async function assignDate() {
  const dateVal = document.getElementById('assign-date').value;
  if (!dateVal) { document.getElementById('assign-date').focus(); return; }

  const resp = await fetch(`/classes/${CLASS_ID}/template-assignments`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ template_id: TEMPLATE_ID, date: dateVal }),
  });

  const msg = document.getElementById('result-msg');
  msg.classList.remove('hidden');
  if (resp.ok) {
    msg.className = 'px-4 py-3 rounded-lg text-sm bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 text-green-800 dark:text-green-300';
    msg.textContent = `已成功指派至 ${dateVal}`;
    setTimeout(() => { location.href = `/pages/teacher/classes/${CLASS_ID}/templates`; }, 1200);
  } else {
    const data = await resp.json().catch(() => ({}));
    msg.className = 'px-4 py-3 rounded-lg text-sm bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-800 dark:text-red-300';
    msg.textContent = data.detail || '指派失敗，請稍後再試';
  }
}
</script>
{% endblock %}
