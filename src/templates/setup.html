<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>系統初始設定</title>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 80px auto; padding: 0 16px; }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: 0.25rem; font-weight: 600; }
    input { width: 100%; padding: 8px; margin-bottom: 1rem; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
    button:hover { background: #1d4ed8; }
    .error { color: #dc2626; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <h1>系統初始設定</h1>
  {% if error %}
  <p class="error">{{ error }}</p>
  {% endif %}
  <form method="post" action="/setup">
    <label for="site_name">網站名稱</label>
    <input type="text" id="site_name" name="site_name" required placeholder="例：每日訓練系統">

    <label for="admin_username">管理員帳號</label>
    <input type="text" id="admin_username" name="admin_username" required placeholder="admin">

    <label for="admin_password">管理員密碼</label>
    <input type="password" id="admin_password" name="admin_password" required>

    <button type="submit">完成設定</button>
  </form>
</body>
</html>
